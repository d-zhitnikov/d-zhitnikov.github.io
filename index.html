<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Скоро открытие</title>
  <style>
    :root {
      --bg: #0f1020;
      --fg: #f5f6ff;
      --muted: #9aa0c3;
      --accent: #7c5cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1c1d3a 0%, var(--bg) 60%);
      color: var(--fg);
      display: grid;
      place-items: center;
      min-height: 100%;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      animation: rise 0.8s ease both;
    }
    .badge {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(124, 92, 255, 0.4);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 28px;
    }
    h1 {
      font-size: clamp(34px, 7vw, 56px);
      line-height: 1.05;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--muted);
      font-size: clamp(16px, 2.5vw, 19px);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .dots { display: inline-flex; gap: 8px; }
    .dots span {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    footer {
      position: fixed; bottom: 20px; left: 0; right: 0;
      color: var(--muted); font-size: 13px;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Скоро открытие</span>
    <h1>Здесь скоро будет сайт</h1>
    <p>Мы готовим что-то интересное. Загляните чуть позже — уже совсем скоро тут появится содержимое.</p>
    <div class="dots"><span></span><span></span><span></span></div>
  </main>
  <footer>© 2026 · Работаем над сайтом</footer>
</body>
</html>
