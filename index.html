<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evgenii · Neural Networks Guru</title>
  <style>
    :root {
      --bg: #05060f;
      --fg: #eef1ff;
      --accent: #00e5ff;
      --accent2: #b14bff;
      --saberA: #35a0ff;
      --saberB: #34ff6a;
      --saberC: #ff3b52;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      overflow: hidden;
    }
    canvas#net { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.45; }
    .glow {
      position: fixed; z-index: 1; pointer-events: none;
      width: 60vmax; height: 60vmax; border-radius: 50%;
      top: -22vmax; left: 50%; transform: translateX(-50%);
      background: radial-gradient(closest-side, rgba(0,229,255,0.15), transparent 70%);
      filter: blur(20px);
    }
    .wrap {
      position: relative; z-index: 2;
      height: 100vh; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(18px, 4vh, 44px);
      padding: 24px; text-align: center;
    }
    .stage { width: 100%; max-width: 640px; animation: fade 0.9s ease both; }
    .stage svg { display: block; width: 100%; height: auto; overflow: visible; }
    .line {
      font-size: clamp(20px, 3.4vw, 34px);
      font-weight: 600; letter-spacing: -0.01em; line-height: 1.3;
      max-width: 720px; animation: fade 0.9s ease 0.2s both;
    }
    .line .grad {
      background: linear-gradient(100deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    @keyframes fade { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    .fighterL { animation: lunge 2.2s ease-in-out infinite; transform-origin: 120px 210px; }
    .fighterR { animation: lungeR 2.2s ease-in-out infinite; transform-origin: 320px 210px; }
    @keyframes lunge { 0%,100% { transform: translateX(0); } 45% { transform: translateX(14px); } }
    @keyframes lungeR { 0%,100% { transform: translateX(0); } 45% { transform: translateX(-14px); } }

    .saberL { animation: swingL 2.2s ease-in-out infinite; transform-origin: 168px 150px; }
    .saberR { animation: swingR 2.2s ease-in-out infinite; transform-origin: 300px 150px; }
    .saberR2 { animation: swingR2 2.2s ease-in-out infinite; transform-origin: 348px 158px; }
    @keyframes swingL { 0%,100% { transform: rotate(-24deg); } 45% { transform: rotate(6deg); } 55% { transform: rotate(4deg); } }
    @keyframes swingR { 0%,100% { transform: rotate(26deg); } 45% { transform: rotate(-6deg); } 55% { transform: rotate(-4deg); } }
    @keyframes swingR2 { 0%,100% { transform: rotate(38deg); } 50% { transform: rotate(10deg); } }

    .clash { transform-origin: 236px 118px; animation: clash 2.2s ease-in-out infinite; }
    @keyframes clash { 0%,38%,60%,100% { opacity: 0; transform: scale(0.4); } 45%,52% { opacity: 1; transform: scale(1); } }

    .blade { animation: flicker 0.12s steps(2) infinite; }
    @keyframes flicker { 50% { opacity: 0.88; } }

    @media (prefers-reduced-motion: reduce) {
      .fighterL, .fighterR, .saberL, .saberR, .saberR2, .clash, .blade { animation: none; }
    }
  </style>
</head>
<body>

      </svg>
    </div>

    <p class="line">Evgenii fights for your <span class="grad">neural-network education</span>.</p>
  </main>

  <script>
    const c = document.getElementById('net'), x = c.getContext('2d');
    let w, h, nodes;
    function initNet() {
      w = c.width = window.innerWidth; h = c.height = window.innerHeight;
      const count = Math.min(80, Math.floor(w * h / 18000));
      nodes = Array.from({length: count}, () => ({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4
      }));
    }
    function draw() {
      x.clearRect(0, 0, w, h);
      for (const n of nodes) {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > w) n.vx *= -1;
        if (n.y < 0 || n.y > h) n.vy *= -1;
      }
      for (let i = 0; i < nodes.length; i++)
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j], d = Math.hypot(a.x - b.x, a.y - b.y);
          if (d < 130) { x.strokeStyle = `rgba(0,229,255,${(1 - d / 130) * 0.45})`; x.lineWidth = 1; x.beginPath(); x.moveTo(a.x, a.y); x.lineTo(b.x, b.y); x.stroke(); }
        }
      for (const n of nodes) { x.fillStyle = 'rgba(177,75,255,0.9)'; x.beginPath(); x.arc(n.x, n.y, 1.8, 0, Math.PI * 2); x.fill(); }
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', initNet);
    initNet(); draw();
  </script>
</body>
</html>
