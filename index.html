<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eugene · Neural Networks Guru</title>
  <style>
    :root {
      --bg: #05060f;
      --fg: #eef1ff;
      --muted: #8b93c7;
      --accent: #00e5ff;
      --accent2: #b14bff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
      min-height: 100%;
    }
    canvas#net {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.55;
    }
    .glow {
      position: fixed; z-index: 1; pointer-events: none;
      width: 60vmax; height: 60vmax; border-radius: 50%;
      top: -20vmax; left: 50%; transform: translateX(-50%);
      background: radial-gradient(closest-side, rgba(0,229,255,0.18), transparent 70%);
      filter: blur(20px);
    }
    .wrap {
      position: relative; z-index: 2;
      max-width: 860px; margin: 0 auto;
      padding: 96px 24px 120px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,229,255,0.35);
      border-radius: 999px; padding: 7px 16px;
      margin-bottom: 32px;
      backdrop-filter: blur(6px);
      animation: fade 0.8s ease both;
    }
    h1 {
      font-size: clamp(40px, 9vw, 84px);
      line-height: 1.0; letter-spacing: -0.03em;
      margin-bottom: 22px;
      animation: fade 0.8s ease 0.1s both;
    }
    h1 .grad {
      background: linear-gradient(100deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tag {
      font-size: clamp(17px, 2.6vw, 22px);
      color: var(--muted); line-height: 1.6;
      max-width: 620px; margin: 0 auto 20px;
      min-height: 1.6em;
      animation: fade 0.8s ease 0.2s both;
    }
    .cursor { color: var(--accent); animation: blink 1s steps(1) infinite; }
    .stats {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 14px;
      margin: 40px 0 44px;
      animation: fade 0.8s ease 0.3s both;
    }
    .stat {
      border: 1px solid rgba(139,147,199,0.2);
      border-radius: 16px; padding: 18px 24px;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(6px);
      min-width: 150px;
    }
    .stat b { display: block; font-size: 28px; color: var(--fg); }
    .stat span { font-size: 13px; color: var(--muted); letter-spacing: 0.04em; }
    .cta {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 600;
      color: #05060f; text-decoration: none;
      background: linear-gradient(100deg, var(--accent), var(--accent2));
      padding: 15px 30px; border-radius: 999px;
      box-shadow: 0 10px 40px -8px rgba(0,229,255,0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: fade 0.8s ease 0.4s both;
    }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 16px 50px -8px rgba(177,75,255,0.6); }
    footer {
      position: relative; z-index: 2;
      text-align: center; color: var(--muted);
      font-size: 13px; padding-bottom: 32px;
    }
    @keyframes fade { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    @keyframes blink { 50% { opacity: 0; } }

    /* Bearded guru */
    .guru { margin: 0 auto 26px; width: 180px; animation: fade 0.8s ease both; }
    .guru svg { display: block; overflow: visible; }
    .head { animation: bob 4s ease-in-out infinite; transform-origin: 100px 120px; }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-1.5deg); }
      50% { transform: translateY(-6px) rotate(1.5deg); }
    }
    .eye { transform-origin: center; animation: wink 4.5s ease-in-out infinite; }
    @keyframes wink {
      0%, 92%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    .orbit { transform-origin: 100px 95px; animation: spin 14s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .halo { animation: pulseHalo 3.5s ease-in-out infinite; transform-origin: 100px 95px; }
    @keyframes pulseHalo {
      0%, 100% { opacity: 0.75; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.06); }
    }
    @media (prefers-reduced-motion: reduce) {
      .head, .eye, .orbit, .halo { animation: none; }
    }
  </style>
</head>
<body>
  <canvas id="net"></canvas>
  <div class="glow"></div>

  <main class="wrap">
    <div class="guru" aria-label="Eugene the bearded guru">
      <svg viewBox="0 0 200 220" width="180" height="198" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="halo" cx="50%" cy="45%" r="55%">
            <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="beard" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d98a4a"/>
            <stop offset="100%" stop-color="#b25a25"/>
          </linearGradient>
          <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c9a066"/>
            <stop offset="100%" stop-color="#9c7538"/>
          </linearGradient>
        </defs>

        <!-- glowing thought halo -->
        <circle class="halo" cx="100" cy="95" r="90" fill="url(#halo)"/>

        <!-- floating orbiting neurons -->
        <g class="orbit">
          <circle cx="100" cy="18" r="4" fill="#b14bff"/>
          <circle cx="182" cy="100" r="3" fill="#00e5ff"/>
          <circle cx="18" cy="120" r="3.4" fill="#00e5ff"/>
        </g>

        <g class="head">
          <!-- plaid flannel shoulders -->
          <g>
            <path d="M52 190 Q52 158 78 150 L122 150 Q148 158 148 190 Z" fill="#7d2b33"/>
            <path d="M52 190 Q52 158 78 150 L122 150 Q148 158 148 190 Z" fill="none" stroke="#28324f" stroke-width="0" />
            <!-- plaid lines (clipped by shirt shape via overlap) -->
            <g stroke="#2c3556" stroke-width="3" opacity="0.85">
              <line x1="70" y1="150" x2="70" y2="190"/>
              <line x1="100" y1="150" x2="100" y2="190"/>
              <line x1="130" y1="150" x2="130" y2="190"/>
              <line x1="52" y1="164" x2="148" y2="164"/>
              <line x1="52" y1="180" x2="148" y2="180"/>
            </g>
            <g stroke="#e7e9f2" stroke-width="1" opacity="0.5">
              <line x1="85" y1="150" x2="85" y2="190"/>
              <line x1="115" y1="150" x2="115" y2="190"/>
            </g>
            <!-- white tee triangle -->
            <path d="M92 150 L100 168 L108 150 Z" fill="#f4f6ff"/>
          </g>
          <!-- neck -->
          <rect x="88" y="140" width="24" height="20" rx="8" fill="#e9b98f"/>
          <!-- faded short sides -->
          <path d="M56 74 Q58 40 100 40 Q142 40 144 74 L144 96 Q140 70 100 70 Q60 70 56 96 Z" fill="url(#hair)"/>
          <!-- swept-up pompadour quiff -->
          <path d="M60 62 Q64 28 104 30 Q128 31 132 46 Q120 40 104 44 Q84 48 78 66 Z" fill="url(#hair)"/>
          <path d="M78 66 Q84 40 112 40 Q100 46 96 66 Z" fill="#b58f52" opacity="0.7"/>
          <!-- face (fuller) -->
          <ellipse cx="100" cy="92" rx="43" ry="46" fill="#f2c79c"/>
          <!-- ears -->
          <circle cx="57" cy="94" r="8" fill="#f2c79c"/>
          <circle cx="143" cy="94" r="8" fill="#f2c79c"/>
          <!-- eyebrows (light brown) -->
          <rect x="72" y="82" width="20" height="4" rx="2" fill="#8a6a3a"/>
          <rect x="108" y="82" width="20" height="4" rx="2" fill="#8a6a3a"/>
          <!-- thick black rectangular glasses -->
          <g stroke="#0a0a0f" stroke-width="4" fill="rgba(120,200,255,0.14)" stroke-linejoin="round">
            <rect x="68" y="86" width="26" height="20" rx="5"/>
            <rect x="106" y="86" width="26" height="20" rx="5"/>
            <line x1="94" y1="94" x2="106" y2="94"/>
            <line x1="68" y1="90" x2="57" y2="88"/>
            <line x1="132" y1="90" x2="143" y2="88"/>
          </g>
          <!-- eyes (blink) -->
          <circle class="eye" cx="81" cy="96" r="3.2" fill="#3a2a1f"/>
          <circle class="eye" cx="119" cy="96" r="3.2" fill="#3a2a1f"/>
          <!-- nose -->
          <path d="M100 100 l-4 12 h8 Z" fill="#e0b184"/>
          <!-- the mighty ginger beard -->
          <path d="M58 104
                   Q56 116 62 132
                   Q72 168 100 182
                   Q128 168 138 132
                   Q144 116 142 104
                   Q128 122 100 122
                   Q72 122 58 104 Z" fill="url(#beard)"/>
          <!-- beard texture strokes -->
          <g stroke="#8f4418" stroke-width="1.4" opacity="0.5" fill="none" stroke-linecap="round">
            <path d="M74 128 Q76 150 84 166"/>
            <path d="M100 126 L100 172"/>
            <path d="M126 128 Q124 150 116 166"/>
          </g>
          <!-- ginger moustache -->
          <path d="M82 114 Q100 126 118 114 Q100 120 82 114 Z" fill="#c26a2c"/>
          <!-- smile -->
          <path d="M90 116 Q100 122 110 116" stroke="#8a4a24" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <span class="badge">Neural Networks · Guru Mode</span>
    <h1>Meet <span class="grad">Eugene</span></h1>
    <p class="tag"><span id="type"></span><span class="cursor">▋</span></p>

    <div class="stats">
      <div class="stat"><b>10<span style="font-size:18px">B+</span></b><span>parameters tamed</span></div>
      <div class="stat"><b>0</b><span>gradients exploded</span></div>
      <div class="stat"><b>∞</b><span>epochs of wisdom</span></div>
    </div>

    <a class="cta" href="#">Train with Eugene &nbsp;→</a>
  </main>

  <footer>© 2026 Eugene · Whispering to neurons since forever</footer>

  <script>
    // Typewriter tagline
    const lines = [
      "He doesn't overfit. Reality does.",
      "Turning coffee into convergence.",
      "Backpropagating good vibes.",
      "The only guru your GPU listens to."
    ];
    const el = document.getElementById('type');
    let li = 0, ci = 0, deleting = false;
    function tick() {
      const line = lines[li];
      el.textContent = line.slice(0, ci);
      if (!deleting && ci < line.length) { ci++; setTimeout(tick, 45); }
      else if (!deleting) { deleting = true; setTimeout(tick, 1800); }
      else if (ci > 0) { ci--; setTimeout(tick, 22); }
      else { deleting = false; li = (li + 1) % lines.length; setTimeout(tick, 300); }
    }
    tick();

    // Neural-net constellation background
    const c = document.getElementById('net'), x = c.getContext('2d');
    let w, h, nodes;
    function init() {
      w = c.width = window.innerWidth; h = c.height = window.innerHeight;
      const count = Math.min(90, Math.floor(w * h / 16000));
      nodes = Array.from({length: count}, () => ({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4
      }));
    }
    function draw() {
      x.clearRect(0, 0, w, h);
      for (const n of nodes) {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > w) n.vx *= -1;
        if (n.y < 0 || n.y > h) n.vy *= -1;
      }
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const d = Math.hypot(a.x - b.x, a.y - b.y);
          if (d < 130) {
            x.strokeStyle = `rgba(0,229,255,${(1 - d / 130) * 0.5})`;
            x.lineWidth = 1;
            x.beginPath(); x.moveTo(a.x, a.y); x.lineTo(b.x, b.y); x.stroke();
          }
        }
      }
      for (const n of nodes) {
        x.fillStyle = 'rgba(177,75,255,0.9)';
        x.beginPath(); x.arc(n.x, n.y, 1.8, 0, Math.PI * 2); x.fill();
      }
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init);
    init(); draw();
  </script>
</body>
</html>
